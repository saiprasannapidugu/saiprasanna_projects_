<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Diabetic Retinopathy Detection</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
<div class="page-wrapper">

    <header class="app-header">
        <div class="title-group">
            <h1>Diabetic Retinopathy Detection</h1>
        </div>
        <button class="btn btn-danger">Logout</button>
    </header>

    <main class="main-card">
        <section class="upload-section">
            <div class="upload-inner">
                <h2>Upload Fundus Image</h2>
                <p>Select a retinal image and click “Analyze Image” to see the result.</p>

                {% if error %}
                    <div class="alert alert-error">{{ error }}</div>
                {% endif %}

                <form method="POST" enctype="multipart/form-data" class="upload-form">
                    <!-- Hidden file input -->
                    <input type="file" id="fileInput" name="file" accept="image/*" required hidden>

                    <div class="button-row">
                        <label for="fileInput" class="btn btn-primary">Choose Image</label>
                        <button type="submit" class="btn btn-success">Analyze Image</button>
                    </div>

                    <p id="fileName" class="file-name">No file chosen</p>
                </form>
            </div>
        </section>

        <section class="result-placeholder">
            <h3>Analysis Result</h3>
            <p class="result-hint">Result will appear here after you upload and analyze an image.</p>
        </section>
    </main>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const fileName = document.getElementById('fileName');

    fileInput.addEventListener('change', () => {
        if (fileInput.files.length > 0) {
            fileName.textContent = fileInput.files[0].name;
        } else {
            fileName.textContent = 'No file chosen';
        }
    });
</script>
</body>
</html>
